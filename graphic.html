<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bwrld</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    background: #0f0e1a;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 15% 50%, #4f3fcf 0%, transparent 65%),
      radial-gradient(ellipse 50% 55% at 85% 40%, #1a6fd4 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 85%, #7b2fbe 0%, transparent 55%),
      #0f0e1a;
    z-index: 0;
  }

  .logo {
    position: fixed;
    top: 28px;
    right: 36px;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    z-index: 10;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 32px;
    padding: 80px 80px;
    max-width: 640px;
    width: calc(100% - 48px);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .title {
    font-size: clamp(80px, 18vw, 140px);
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: #fff;
    text-shadow:
      0 0 40px rgba(180, 160, 255, 0.9),
      0 0 80px rgba(140, 100, 255, 0.6),
      0 0 120px rgba(100, 60, 220, 0.4);
    animation: pulse 3s ease-in-out infinite;
  }

  .subtitle {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: rgba(255, 255, 255, 0.75);
    text-shadow:
      0 0 20px rgba(180, 160, 255, 0.7),
      0 0 50px rgba(140, 100, 255, 0.4);
    animation: pulse 3s ease-in-out infinite;
    animation-delay: 0.4s;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.82; }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <span class="logo">bwrld</span>
  <div class="card">
    <div class="title">bwrld</div>
    <div class="subtitle">in construction &lt;3</div>
  </div>
</body>
</html>
